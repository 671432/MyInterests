<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Interests</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpg" />
    <link rel="stylesheet" href="css/old_style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <h1>My Interests & Me</h1>

        <!-- Social Buttons -->
        <div>
          <a
            class="social youtube"
            href="https://www.youtube.com/@MasterRaxer"
            target="_blank"
            rel="noopener noreferrer"
            >YouTube</a
          >
          <a
            class="social music"
            href="https://music.youtube.com/channel/UC4wZW8gdEuy_o6AA1JyyGnQ?si=EwYzZWozzFifliFp"
            target="_blank"
            rel="noopener noreferrer"
            >Music</a
          >

          <div class="accordionWrapper">
            <button class="accordion" data-target="movies">Movies</button>
            <div class="panel" id="movies">
              <a
                class="social movies"
                href="https://simkl.com/movies/all/all-countries/completed/all-years/user-7334903/"
                target="_blank"
                >Watched</a
              >
              <a
                class="social movies"
                href="https://simkl.com/movies/all/all-countries/plan-to-watch/all-years/user-7334903/"
                target="_blank"
                >Planned</a
              >
            </div>
          </div>

          <div class="accordionWrapper">
            <button class="accordion" data-target="shows">Shows</button>
            <div class="panel" id="shows">
              <a
                class="social shows"
                href="https://simkl.com/tv/all/all-types/all-countries/completed/all-years/user-7334903/"
                target="_blank"
                >Watched</a
              >
              <a
                class="social shows"
                href="https://simkl.com/tv/all/all-types/all-countries/watching/all-years/user-7334903/"
                target="_blank"
                >Watching</a
              >
              <a
                class="social shows"
                href="https://simkl.com/tv/all/all-types/all-countries/plan-to-watch/all-years/user-7334903/"
                target="_blank"
                >Planned</a
              >
            </div>
          </div>

          <a
            class="social anime"
            href="https://myanimelist.net/animelist/MasterRaxer?status=2&order=4&order2=0"
            target="_blank"
            >Anime</a
          >
          <a
            class="social kdrama"
            href="https://mydramalist.com/dramalist/Raxer/completed"
            target="_blank"
            >K-Drama</a
          >
        </div>
      </div>
    </header>

    <script src="scripts/old_simklButtons.js"></script>
  </body>
</html>
